<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .quote-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            text-align: center;
            border-left: 8px solid #2c3e50;
        }

        .quote-text {
            font-size: 1.5rem;
            line-height: 1.6;
            color: #34495e;
            font-style: italic;
            margin: 0;
        }

        .highlight {
            color: #e67e22;
            font-weight: bold;
            font-style: normal;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="quote-card">
        <p class="quote-text">
            "Choose someone who chooses you <span class="highlight">every day</span>, not just when they are in a mood for you.
You deserve consistency, not confusion. Anything less is just <span class="highlight">noise</span>."
        </p>
        <div class="footer-note">— Self Reminder</div>
    </div>

</body>
</html>
